<body>

  <h2>Scanner QR Presenze</h2>

  <!-- ✅ Bottone avvio -->
  <button onclick="startScanner()" style="padding:10px 20px; font-size:16px;">
    📷 Avvia scansione
  </button>
  <p>Tocca il pulsante per attivare la fotocamera</p>
  <br><br>

  <div id="reader" style="width:300px;"></div>

<script>

let userName = "";
let userId = "";
let userEmail = "";
let scanned = false;
let html5QrCode;

// ✅ inizializza Teams
microsoftTeams.app.initialize().then(() => {
  microsoftTeams.app.getContext().then(ctx => {
    userName = ctx.user.displayName;
    userId = ctx.user.id;
    userEmail = ctx.user.userPrincipalName;
  });
});

// ✅ funzione scan
function onScanSuccess(decodedText) {

  if (scanned) return;
  scanned = true;

  alert("✅ QR letto: " + decodedText);

  fetch("URL_FLOW_CORRETTO", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      site: decodedText,
      user: userEmail,
      userId: userId,
      time: new Date().toISOString()
    })
  })
  .then(() => {
    alert("✅ Presenza registrata");

    if (navigator.vibrate) {
      navigator.vibrate(200);
    }
  })
  .catch(err => {
    console.error(err);
    alert("❌ Errore invio dati");
  })
  .finally(() => {
    setTimeout(() => {
      scanned = false;
    }, 5000);
  });
}

// ✅ avvio camera (manuale)
function startScanner() {

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {

      html5QrCode.start(
        devices[0].id,
        {
          fps: 10,
          qrbox: 250
        },
        onScanSuccess
      );

    }
  }).catch(err => {
    console.error(err);
    alert("❌ Errore accesso camera");
  });
}

</script>

</body>
