<!DOCTYPE html>
<html>
<head>
  <title>Scanner QR Presenze</title>

  <!-- Libreria QR -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

  <!-- Teams SDK -->
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>
</head>

<body>

  <h2>Scanner QR Presenze</h2>

  <!-- ✅ Bottone -->
  <button onclick="startScanner()" style="padding:30px 70px; font-size:26px;">
    📷 Avvia scansione
  </button>

  <p>Tocca il pulsante per attivare la fotocamera</p>

  <br><br>

  <!-- Scanner -->
  <div id="reader" style="width:300px;"></div>

  <!-- Debug -->
  <div id="debug" style="margin-top:28px; color:red; font-size:18px;"></div>

<script>

// ✅ debug visivo
function debug(msg) {
  console.log(msg);
  document.getElementById("debug").innerText += msg + "\n";
}

// variabili
let userName = "";
let userId = "";
let userEmail = "";
let scanned = false;
let html5QrCode;

// ✅ inizializza Teams
microsoftTeams.app.initialize().then(() => {
  microsoftTeams.app.getContext().then(ctx => {
    userName = ctx.user.displayName;
    userId = ctx.user.id;
    userEmail = ctx.user.userPrincipalName;

    debug("👤 Utente: " + userEmail);
  });
});

// ✅ funzione quando legge QR
function onScanSuccess(decodedText) {

  if (scanned) return;
  scanned = true;

  debug("✅ QR letto: " + decodedText);

  fetch("https://4b8d92cb9522e43cb66e80c4f04df1.4c.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/186f84364ae04ca8a8aa8c114442c629/triggers/manual/paths/invoke?api-version=1", {  // 👈 SOSTITUISCI
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      site: decodedText,
      user: userEmail,
      userId: userId,
      time: new Date().toISOString()
    })
  })
  .then(() => {
    debug("✅ Presenza registrata");

    if (navigator.vibrate) {
      navigator.vibrate(200);
    }
  })
  .catch(err => {
    debug("❌ Errore invio: " + err);
  })
  .finally(() => {
    setTimeout(() => {
      scanned = false;
    }, 5000);
  });
}

// ✅ AVVIO CAMERA (FIX DEFINITIVO)
function startScanner() {

  debug("🔄 Avvio scanner...");

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(() => {

      debug("✅ Permesso camera OK");

      html5QrCode = new Html5Qrcode("reader");

      Html5Qrcode.getCameras().then(devices => {

        debug("📷 Camere trovate: " + devices.length);

        if (devices && devices.length > 0) {

          let cameraId = devices[0].id;

          debug("🎥 Uso camera: " + cameraId);

          html5QrCode.start(
            cameraId,
            {
              fps: 10,
              qrbox: 250
            },
            onScanSuccess
          )
          .then(() => {
            debug("✅ Scanner avviato");
          })
          .catch(err => {
            debug("❌ Errore авvio: " + err);
          });

        } else {
          debug("❌ Nessuna camera trovata");
        }

      }).catch(err => {
        debug("❌ Errore accesso camera: " + err.name + " - " + err.message);
      });

    })
    .catch(() => {
      debug("❌ Permesso camera NEGATO:");
    });
}

</script>

</body>
</html>
