<!DOCTYPE html>
<html>
<head>
<!-- test11 -->
  
  <title>Scanner QR Presenze</title>

  <!-- Libreria QR -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

  <!-- Teams SDK -->
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>
</head>

<body>

<h2>Scanner QR Presenze</h2>

<div id="reader" style="width:300px;"></div>

<script>
let userName = "";
let userId = "";
let userEmail = "";  
let scanned = false;

// ✅ Inizializzazione Teams
microsoftTeams.app.initialize().then(() => {
  microsoftTeams.app.getContext().then(ctx => {
    userName = ctx.user.displayName;
    userId = ctx.user.id;
    userEmail = ctx.user.userPrincipalName;
    console.log("Utente:", userName);
  });
});

// ✅ Funzione scanner QR
function onScanSuccess(decodedText) {

  // ✅ blocco doppia scansione
  if (scanned) return;
  scanned = true;

  alert("✅ QR letto: " + decodedText);

  // ✅ chiamata Power Automate
  fetch("https://4b8d92cb9522e43cb66e80c4f04df1.4c.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/186f84364ae04ca8a8aa8c114442c629/triggers/manual/paths/invoke?api-version=1", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      site: decodedText,
      user: userEmail,
      userId: userId,
      time: new Date().toISOString()
    })
  })
  .then(() => {
    alert("✅ Presenza registrata");

    // ✅ vibrazione su mobile (opzionale)
    if (navigator.vibrate) {
      navigator.vibrate(200);
    }
  })
  .catch((err) => {
    console.error(err);
    alert("❌ Errore invio dati");
  })
  .finally(() => {
    // ✅ reset scanner dopo 5 secondi
    setTimeout(() => {
      scanned = false;
    }, 5000);
  });
}

// ✅ Avvio scanner
const scanner = new Html5QrcodeScanner("reader", {
  fps: 10,
  qrbox: 250
});

scanner.render(onScanSuccess);

</script>

</body>
</html>
