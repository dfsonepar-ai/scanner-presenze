<!DOCTYPE html>
<html>
<head>
  <title>Scanner QR Presenze</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>
</head>

<body>

<h2>Scanner QR Presenze</h2>

<div id="reader" style="width:300px;"></div>

<script>
let userName = "";
let userId = "";
let scanned = false;

// inizializza Teams
microsoftTeams.app.initialize().then(() => {
  microsoftTeams.app.getContext().then(ctx => {
    userName = ctx.user.displayName;
    userId = ctx.user.id;

    console.log("Utente:", userName);
  });
});

// scanner QR
function onScanSuccess(decodedText) {

  if (scanned) return;   // ✅ blocco doppio scan
  scanned = true;

  alert("✅ QR: " + decodedText);

  fetch("URL_FLOW_CORRETTO", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      site: decodedText,
      user: userName,
      userId: userId,
      time: new Date().toISOString()
    })
  });
setTimeout(() => {
  scanned = false;
}, 5000); // 5 secondi

  
}

const scanner = new Html5QrcodeScanner("reader", {
  fps: 10,
  qrbox: 250
});

scanner.render(onScanSuccess);

</script>
</body>
</html>
