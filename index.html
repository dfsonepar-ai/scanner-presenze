<!DOCTYPE html>
<html>
<head>
  <title>Scanner QR Presenze</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>
</head>

<body>

<h2>Scanner QR Presenze</h2>

<div id="reader" style="width:300px;"></div>

<script>
let userName = "";
let userId = "";

// inizializza Teams
microsoftTeams.app.initialize().then(() => {
  microsoftTeams.app.getContext().then(ctx => {
    userName = ctx.user.displayName;
    userId = ctx.user.id;

    console.log("Utente:", userName);
  });
});

// scanner QR
function onScanSuccess(decodedText) {
  alert("✅ QR: " + decodedText);

  // invio dati (per ora console)

fetch("https://make.powerautomate.com/environments/4b8d92cb-9522-e43c-b66e-80c4f04df14c/flows/ae2d0394-3508-447f-bcc7-27e102b2bb6a?v3=true", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    site: decodedText,
    user: userName,
    userId: userId,
    time: new Date().toISOString()
  })
});

}

const scanner = new Html5QrcodeScanner("reader", {
  fps: 10,
  qrbox: 250
});

scanner.render(onScanSuccess);
