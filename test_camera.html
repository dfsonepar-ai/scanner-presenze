<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>Scanner QR Test</title>

<!-- ✅ Libreria corretta -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

</head>

<body>

<h2>Scanner QR Presenze</h2>

<button id="startBtn" style="padding:10px; font-size:16px;">
📷 Avvia Scansione
</button>

<p id="status">Premi il pulsante</p>

<div id="reader" style="width:300px;"></div>

<script>

const status = document.getElementById("status");
let html5QrCode;

document.getElementById("startBtn").addEventListener("click", () => {

  status.textContent = "🔄 Avvio scanner...";

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    if (devices.length) {

      // ✅ camera posteriore
      const back = devices.find(d =>
        d.label.toLowerCase().includes("back")
      );

      const cameraId = back ? back.id : devices[0].id;

      html5QrCode.start(
        cameraId,
        { fps: 10, qrbox: 250 },
        decodedText => {
          status.textContent = "✅ QR: " + decodedText;
          html5QrCode.stop();
        }
      );

    } else {
      status.textContent = "❌ Nessuna camera";
    }

  }).catch(err => {
    status.textContent = "❌ Errore: " + err;
  });

});

</script>

</body>
</html>
