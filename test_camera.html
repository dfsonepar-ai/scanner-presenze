<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>Scanner QR Test</title>

<!-- ✅ Libreria corretta -->
<script src="html5-qrcode.min.js"></script>

</head>

<body>

<h2>Scanner QR Presenze</h2>

<button id="startBtn" style="padding:10px; font-size:16px;">
📷 Avvia Scansione
</button>

<p id="status">Premi il pulsante</p>

<div id="reader" style="width:300px;"></div>

<script>

const status = document.getElementById("status");
let html5QrCode;

function log(msg) {
  console.log(msg);
  status.innerText += "\n" + msg;
}

document.getElementById("startBtn").addEventListener("click", async () => {

  status.innerText = "🔄 Avvio scanner...";

  try {
    // ✅ controlla libreria
    if (typeof Html5Qrcode === "undefined") {
      log("❌ Libreria html5-qrcode NON caricata");
      return;
    }

    log("✅ Libreria caricata");

    html5QrCode = new Html5Qrcode("reader");

    const devices = await Html5Qrcode.getCameras();

    log("📷 Dispositivi trovati: " + devices.length);

    if (!devices.length) {
      log("❌ Nessuna camera disponibile");
      return;
    }

    // ✅ selezione camera posteriore
    let camera = devices.find(d =>
      d.label.toLowerCase().includes("back") ||
      d.label.toLowerCase().includes("rear")
    );

    if (!camera) {
      log("⚠️ Camera posteriore non trovata, uso default");
      camera = devices[0];
    }

    log("🎥 Uso camera: " + camera.label);

    
    await html5QrCode.start(
      { facingMode: "environment" },   // ✅ FORZA POSTERIORE
      { fps: 10, qrbox: 250 },
      decodedText => {
        log("✅ QR LETTO: " + decodedText);
        html5QrCode.stop();
      }
    );


    log("✅ Scanner attivo (camera posteriore)");

  } catch (err) {
    log("❌ ERRORE: " + err.message);
    console.error(err);
  }

});

</script>

</body>
</html>
