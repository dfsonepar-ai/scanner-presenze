<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>Scanner QR Presenze</title>

<!-- Libreria QR LOCALE -->
<script src="./html5-qrcode.min.js"></script>

</head>

<body>

<h2>Scanner QR Presenze</h2>

<button id="startBtn" style="padding:10px 20px; font-size:16px;">
📷 Avvia Scansione
</button>

<p id="status">Premi il pulsante per iniziare</p>

<div id="reader" style="width:300px;"></div>

<script>

const status = document.getElementById("status");
let html5QrCode;
let scanned = false;

// ✅ funzione log
function log(msg) {
  console.log(msg);
  status.innerText += "\n" + msg;
}

// ✅ click pulsante
document.getElementById("startBtn").addEventListener("click", async () => {

  status.innerText = "🔄 Avvio scanner...";

  try {

    // ✅ controllo libreria
    if (typeof Html5Qrcode === "undefined") {
      log("❌ Libreria NON caricata");
      return;
    }

    log("✅ Libreria OK");

    html5QrCode = new Html5Qrcode("reader");

    // ✅ prendi dispositivi
    const devices = await Html5Qrcode.getCameras();

    log("📷 Camere trovate: " + devices.length);

    if (!devices.length) {
      log("❌ Nessuna camera disponibile");
      return;
    }

    // ✅ forza camera posteriore
    await html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },

      // ✅ quando legge QR
      decodedText => {

        if (scanned) return;
        scanned = true;

        log("✅ QR LETTO: " + decodedText);

        // ✅ CHIAMATA AL TUO FLOW
        fetch("https://4b8d92cb9522e43cb66e80c4f04df1.4c.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/186f84364ae04ca8a8aa8c114442c629/triggers/manual/paths/invoke?api-version=1", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            site: decodedText,
            user: "diego.francescon@sonepar.it", // 👉 metteremo Teams dopo

            time: new Date().toISOString()
          })
        })
        .then(res => {
          log("✅ FETCH OK - chiamata inviata");
          console.log(res);
        })
        .catch(err => {
          log("❌ ERRORE FETCH: " + err);
          console.error(err);
        });
      
        // ✅ stop scanner
        html5QrCode.stop();

      }
    );

    log("✅ Scanner attivo");

  } catch (err) {
    console.error(err);
    log("❌ ERRORE: " + err.message);
  }

});

</script>

</body>
</html>
